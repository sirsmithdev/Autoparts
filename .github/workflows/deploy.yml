name: Build & Deploy Parts Store

on:
  push:
    branches: [main]

concurrency:
  group: deploy-parts-store
  cancel-in-progress: true

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: acl-containers/parts-store
  APP_ID: 9b5298e9-815c-49c1-9065-6f9f96b36bac
  DB_CLUSTER_ID: 52fbd4da-f6c5-407a-a768-3c8021bb2e99

jobs:
  # ──────────────────────────────────────────
  # Step 1: Type check
  # ──────────────────────────────────────────
  check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run install:all
      - run: npm run check

  # ──────────────────────────────────────────
  # Step 2: Run database migrations
  # Dynamically adds runner IP to DB firewall, runs migrations, then removes IP
  # ──────────────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Get runner IP and add to DB firewall
        id: firewall
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "runner_ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "Adding runner IP ${RUNNER_IP} to database firewall..."

          # Get existing rules as JSON and build new rules array with runner IP added
          RULES=$(doctl databases firewalls list ${{ env.DB_CLUSTER_ID }} --output json | \
            python3 -c "
          import sys, json
          rules = json.load(sys.stdin)
          existing = [{'uuid': r['uuid'], 'type': r['type'], 'value': r['value']} for r in rules]
          existing.append({'type': 'ip_addr', 'value': '${RUNNER_IP}'})
          print(json.dumps(existing))
          ")

          echo "Updating firewall rules..."
          doctl databases firewalls replace ${{ env.DB_CLUSTER_ID }} --rules "$RULES"
          echo "Firewall updated. Waiting 10s for propagation..."
          sleep 10

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.PARTS_STORE_DATABASE_URL }}
          DB_SSL_REJECT_UNAUTHORIZED: "false"
        run: node --import tsx scripts/run-migrations.js

      - name: Remove runner IP from DB firewall
        if: always()
        run: |
          echo "Removing runner IP ${{ steps.firewall.outputs.runner_ip }} from database firewall..."
          RUNNER_IP="${{ steps.firewall.outputs.runner_ip }}"
          RULES=$(doctl databases firewalls list ${{ env.DB_CLUSTER_ID }} --output json | \
            python3 -c "
          import sys, json
          rules = json.load(sys.stdin)
          filtered = [{'uuid': r['uuid'], 'type': r['type'], 'value': r['value']} for r in rules if r['value'] != '${RUNNER_IP}']
          print(json.dumps(filtered))
          ")
          doctl databases firewalls replace ${{ env.DB_CLUSTER_ID }} --rules "$RULES"
          echo "Runner IP removed from firewall."

  # ──────────────────────────────────────────
  # Step 3: Build Docker image & push to DOCR
  # ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [check, migrate]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_TWS_KEY=${{ vars.NEXT_PUBLIC_TWS_KEY }}
          cache-from: type=gha,scope=parts-store
          cache-to: type=gha,mode=max,scope=parts-store

  # ──────────────────────────────────────────
  # Step 4: Deploy to App Platform
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        run: |
          doctl apps create-deployment ${{ env.APP_ID }}
          echo "Deployment triggered — waiting for parts-store to be healthy..."

      - name: Verify health
        run: |
          for attempt in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://parts.316-automotive.com/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Parts store health check passed (HTTP $STATUS) on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt/20: HTTP $STATUS — retrying in 15s..."
          done
          echo "Parts store health check failed after 20 attempts (5 minutes)"
          exit 1
