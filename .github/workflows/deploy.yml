name: Build & Deploy Parts Store

on:
  push:
    branches: [main]

concurrency:
  group: deploy-parts-store
  cancel-in-progress: true

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: acl-containers/parts-store
  APP_ID: 9b5298e9-815c-49c1-9065-6f9f96b36bac

jobs:
  # ──────────────────────────────────────────
  # Step 1: Type check
  # ──────────────────────────────────────────
  check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run install:all
      - run: npm run check

  # ──────────────────────────────────────────
  # Step 2: Build Docker image & push to DOCR
  # Migrations run at container startup (DO managed MySQL only accepts connections from within the DO network)
  # ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_TWS_KEY=${{ vars.NEXT_PUBLIC_TWS_KEY }}
          cache-from: type=gha,scope=parts-store
          cache-to: type=gha,mode=max,scope=parts-store

  # ──────────────────────────────────────────
  # Step 4: Deploy to App Platform
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        run: |
          doctl apps create-deployment ${{ env.APP_ID }}
          echo "Deployment triggered — waiting for parts-store to be healthy..."

      - name: Verify health
        run: |
          for attempt in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://parts.316-automotive.com/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Parts store health check passed (HTTP $STATUS) on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt/20: HTTP $STATUS — retrying in 15s..."
          done
          echo "Parts store health check failed after 20 attempts (5 minutes)"
          exit 1
